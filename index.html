<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FairyWeather</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://fonts.googleapis.com/css?family=Pixelify Sans' rel='stylesheet'>                
</head>
<body>
    <div class="weather">
    <div class="weather-info">
    <div class="CityAndTime">
    <h4 id="city">City Here</h4>
    <h4 id="time">|  Time Here</h4>
    </div>
    <div class="tempAndLocation">
        <button id="location">Use My Location</button>
        <button id="fahrenheit">°F</button>
        <button id="celsius">°C</button>
    </div>
    </div>

    <div class="weather-animation">
        <div class="gemini">
            <p id="temperature">71°F</p>
        </div>
    
    </div>
    <div class="specifics">
        <h3 id="message">Event Here</h3>
    </div>
    </div>
    </body>


   <script src="script.js"></script> 
</body>
</html>
